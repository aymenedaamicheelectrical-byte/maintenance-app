<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALPLAST - Maintenance System</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --navy: #1e3a8a; --yellow: #facc15; --gray: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #cbd5e1; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 8px solid var(--yellow); position: relative; }
        
        /* تصميم الشعار */
        .header { text-align: center; margin-bottom: 25px; }
        .brand { font-size: 32px; font-weight: 800; color: var(--navy); letter-spacing: 2px; margin: 0; }
        .service-tag { color: #dc2626; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-top: -5px; display: block; }
        
        /* الساعة الحية */
        #live-clock { background: var(--navy); color: white; padding: 8px; border-radius: 8px; font-size: 18px; font-weight: bold; margin: 15px 0; text-align: center; }

        label { display: block; margin: 15px 0 5px; font-weight: bold; color: var(--navy); }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-in { background: #16a34a; }
        .btn-out { background: #dc2626; }
        .btn-reason { background: var(--navy); grid-column: span 2; }
        
        #reason-section { display: none; background: #fffbeb; padding: 15px; border-radius: 12px; border: 1px dashed var(--yellow); margin-bottom: 15px; }
        #status-msg { margin-top: 20px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="brand">CALPLAST</div>
        <span class="service-tag">Service Maintenance</span>
    </div>

    <div id="live-clock">00:00:00</div>
    
    <label><i class="fas fa-user-gear"></i> اختيار الفني:</label>
    <select id="workerName">
        <option value="">-- اختر الاسم من القائمة --</option>
        <option value="Meziane Hamel">Meziane Hamel</option>
        <option value="Aymen Daamiche">Aymen Daamiche</option>
        <option value="Madassi Omar El Farouq">Madassi Omar El Farouq</option>
    </select>

    <div id="reason-section">
        <label><i class="fas fa-pen-to-square"></i> سبب التبرير:</label>
        <textarea id="reasonText" rows="3" placeholder="اكتب سبب الخروج المبكر أو الغياب..."></textarea>
    </div>

    <div class="btn-group">
        <button onclick="submitData('دخول')" class="btn-in"><i class="fas fa-sign-in-alt"></i> دخول</button>
        <button onclick="submitData('خروج')" class="btn-out"><i class="fas fa-sign-out-alt"></i> خروج</button>
        <button onclick="toggleReason()" class="btn-reason"><i class="fas fa-file-signature"></i> إضافة تبرير غياب/خروج</button>
    </div>

    <div id="status-msg"></div>
</div>

<script>
    // 1. تحديث الساعة الحية
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('ar-DZ');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. إرسال البيانات
    const scriptURL ='https://script.google.com/macros/s/AKfycbxxEewf44FjveBrOWGWxgWny5zPg9op-P6tsq0UYpdtRk9ghX0AIwprg20G4J7VNqyd/exec';

    function toggleReason() {
        const section = document.getElementById('reason-section');
        section.style.display = (section.style.display === 'block') ? 'none' : 'block';
    }

    function submitData(statusType) {
        const name = document.getElementById('workerName').value;
        const reason = document.getElementById('reasonText').value;
        const msg = document.getElementById('status-msg');

        if (!name) { alert("من فضلك اختر اسمك أولاً"); return; }

        msg.innerText = "⏳ جاري التوثيق وإرسال البيانات...";
        msg.style.background = "#dbeafe";
        msg.style.color = "#1e40af";

        navigator.geolocation.getCurrentPosition((pos) => {
            const data = {
                name: name,
                status: statusType,
                reason: reason,
                lat: pos.coords.latitude,
                long: pos.coords.longitude
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
            .then(() => {
                msg.innerText = "✅ تم تسجيل العملية بنجاح";
                msg.style.background = "#dcfce7";
                msg.style.color = "#15803d";
                document.getElementById('reasonText').value = "";
                document.getElementById('reason-section').style.display = 'none';
                setTimeout(() => msg.style.display = 'none', 5000);
            })
            .catch(() => {
                msg.innerText = "❌ فشل الإرسال، تحقق من الإنترنت";
                msg.style.background = "#fee2e2";
                msg.style.color = "#b91c1c";
            });
        }, () => {
            alert("فشل تحديد الموقع. يرجى تفعيل الـ GPS للمصنع");
        });
    }
</script>

</body>
</html>
