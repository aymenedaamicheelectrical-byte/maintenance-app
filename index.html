<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حضور العمال</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>نظام تسجيل الحضور</h2>
        <p>أهلاً بك، يرجى كتابة اسمك:</p>
        <input type="text" id="workerName" placeholder="اكتب اسمك هنا...">
        <button onclick="logAttendance()">تسجيل الحضور</button>
        <div id="status"></div>
    </div>

    <script>
        async function logAttendance() {
            const inputField = document.getElementById('workerName');
            const statusDiv = document.getElementById('status');
            const name = inputField.value;

            if (name.trim() === "") {
                alert("من فضلك ادخل اسمك أولاً");
                return;
            }

            statusDiv.innerText = "جاري الإرسال للقاعدة...";
            statusDiv.style.color = "blue";

            // الرابط الخاص بك مدمج هنا جاهزاً
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzGResJ1O8vTQQv38j-rJPlaWQ-beTYiMiTzF14MZsolGBgmL0CMk5FKbxBKvopEnsq/exec'; 

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({ name: name })
                });
                
                statusDiv.innerText = "تم تسجيل حضورك يا " + name + " بنجاح!";
                statusDiv.style.color = "green";
                inputField.value = ""; 
            } catch (error) {
                statusDiv.innerText = "حدث خطأ! تأكد من الإنترنت.";
                statusDiv.style.color = "red";
            }
        }
    </script>

</body>
</html>
