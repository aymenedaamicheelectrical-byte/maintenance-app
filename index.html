<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALPLAST | Maintenance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3a8a; /* الكحلي */
            --accent: #facc15;  /* الأصفر */
            --success: #10b981;
            --danger: #ef4444;
            --bg: #e2e8f0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #334155;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            margin: 0;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: bold;
        }

        .input-section {
            text-align: right;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--primary);
            font-size: 15px;
        }

        select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        select:focus, textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.2);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s active;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: white;
        }

        button i { font-size: 20px; }

        .btn-in { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-out { background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-extra { 
            grid-column: span 2; 
            background: var(--primary); 
            flex-direction: row; 
            justify-content: center;
        }

        button:active { transform: scale(0.95); opacity: 0.9; }

        #reason-box {
            display: none;
            margin-top: 15px;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            display: none;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <i class="fa-solid fa-gears" style="font-size: 40px; color: var(--accent);"></i>
        <h1 class="logo-text">CALPLAST</h1>
        <div class="subtitle">Maintenance Service Portal</div>
    </div>

    <div class="input-section">
        <label><i class="fa-solid fa-user-gear"></i> اسم الفني المسؤول:</label>
        <select id="name">
            <option value="">إختر الإسم من القائمة...</option>
            <option value="Aymene Daamiche">Aymene Daamiche</option>
            <option value="abdellatif">abdellatif</option>
            <option value="Jawad">Jawad</option>
            <option value="Houssem">Houssem</option>
            <option value="Abd baset">Abd baset</option>
            <option value="Ahmed">Ahmed</option>
            <option value="khawla">khawla</option>
        </select>
    </div>

    <div id="reason-box">
        <label><i class="fa-solid fa-pen-to-square"></i> سبب الغياب / الخروج المبكر:</label>
        <textarea id="reason" rows="3" placeholder="اكتب السبب هنا..."></textarea>
    </div>

    <div class="action-grid">
        <button onclick="send('دخول')" class="btn-in">
            <i class="fa-solid fa-right-to-bracket"></i> تسجيل دخول
        </button>
        <button onclick="send('خروج')" class="btn-out">
            <i class="fa-solid fa-right-from-bracket"></i> تسجيل خروج
        </button>
        <button onclick="toggleReason()" class="btn-extra">
            <i class="fa-solid fa-clipboard-question"></i> إضافة تبرير أو ملاحظة
        </button>
    </div>

    <div id="status"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxxEewf44FjveBrOWGWxgWny5zPg9op-P6tsq0UYpdtRk9ghX0AIwprg20G4J7VNqyd/exec';

    function toggleReason() {
        const box = document.getElementById('reason-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function send(type) {
        const name = document.getElementById('name').value;
        const reason = document.getElementById('reason').value;
        const statusDiv = document.getElementById('status');

        if (!name) {
            alert("يرجى اختيار الاسم أولاً");
            return;
        }

        statusDiv.style.display = 'block';
        statusDiv.style.background = '#dbeafe';
        statusDiv.style.color = '#1e3a8a';
        statusDiv.innerHTML = '<div class="loading-spinner"></div> جاري تأمين الاتصال بالموقع...';

        navigator.geolocation.getCurrentPosition(pos => {
            const payload = {
                name: name,
                status: type,
                reason: reason,
                lat: pos.coords.latitude,
                long: pos.coords.longitude
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
            .then(() => {
                statusDiv.style.background = '#dcfce7';
                statusDiv.style.color = '#15803d';
                statusDiv.innerHTML = '✅ تم تسجيل العملية بنجاح في السجل';
                document.getElementById('reason').value = '';
                setTimeout(() => { statusDiv.style.display = 'none'; }, 4000);
            })
            .catch(() => {
                statusDiv.style.background = '#fee2e2';
                statusDiv.style.color = '#b91c1c';
                statusDiv.innerHTML = '❌ فشل الاتصال، تأكد من الإنترنت';
            });
        }, () => {
            alert("فشل تحديد الموقع! يرجى تفعيل الـ GPS");
            statusDiv.style.display = 'none';
        });
    }
</script>

</body>
</html>
